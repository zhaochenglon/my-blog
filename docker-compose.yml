services:
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-blog_dev_password}
      MYSQL_DATABASE: blog_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - blog_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-blog_dev_password}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  blog-api:
    build:
      context: ./blog-api
      dockerfile: Dockerfile
    container_name: blog-api
    restart: unless-stopped
    ports:
      - "5059:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Server=mysql;Port=3306;Database=blog_db;User=root;Password=${MYSQL_ROOT_PASSWORD:-blog_dev_password};
      Admin__ApiKey: dev-admin-key-change-in-production
      Cors__AllowedOrigins__0: http://localhost:5500
      Cors__AllowedOrigins__1: http://127.0.0.1:5500
      Cors__AllowedOrigins__2: http://localhost:8080
      Cors__AllowedOrigins__3: http://127.0.0.1:8080
      Cors__AllowedOrigins__4: https://zhaochenglon.github.io
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  blog_mysql_data:
