# 仅启动 MySQL，API 在本机用 dotnet run 调试
# 用法: docker compose -f docker-compose.db-only.yml up -d
services:
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-blog_dev_password}
      MYSQL_DATABASE: blog_db
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - blog_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-blog_dev_password}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

volumes:
  blog_mysql_data:
