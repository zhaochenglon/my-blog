<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>留言管理 · JackZ 博客</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-page">
  <header class="admin-header">
    <div class="container admin-header-inner">
      <a href="index.html" class="admin-brand">JackZ · 留言管理</a>
      <div class="admin-header-actions" id="adminHeaderActions" hidden>
        <span class="admin-user" id="adminUserLabel"></span>
        <button type="button" class="btn btn-ghost btn-sm" id="logoutBtn">退出登录</button>
      </div>
    </div>
  </header>

  <main class="admin-main">
    <div class="container">
      <!-- 登录 -->
      <section class="admin-card" id="loginSection">
        <h1 class="admin-title">管理员登录</h1>
        <p class="admin-subtitle">登录后可查看访客提交的留言与联系方式</p>
        <form class="admin-form" id="loginForm">
          <label class="form-field">
            <span>账号</span>
            <input type="text" name="username" autocomplete="username" required placeholder="请输入管理员账号" />
          </label>
          <label class="form-field">
            <span>密码</span>
            <input type="password" name="password" autocomplete="current-password" required placeholder="请输入密码" />
          </label>
          <button type="submit" class="btn btn-primary btn-block" id="loginBtn">登录</button>
        </form>
      </section>

      <!-- 留言列表 -->
      <section class="admin-card" id="dashboardSection" hidden>
        <div class="admin-toolbar">
          <div>
            <h1 class="admin-title">留言列表</h1>
            <p class="admin-subtitle" id="messageSummary">共 0 条留言</p>
          </div>
          <div class="admin-toolbar-actions">
            <button type="button" class="btn btn-danger btn-sm" id="deleteBtn" disabled>删除选中</button>
            <button type="button" class="btn btn-ghost" id="refreshBtn">刷新</button>
          </div>
        </div>

        <div class="admin-table-wrap">
          <table class="admin-table" id="messagesTable">
            <thead>
              <tr>
                <th class="admin-col-check">
                  <input type="checkbox" id="selectAllCheckbox" aria-label="全选" />
                </th>
                <th>ID</th>
                <th>姓名</th>
                <th>邮箱</th>
                <th>留言内容</th>
                <th>提交时间</th>
              </tr>
            </thead>
            <tbody id="messagesBody"></tbody>
          </table>
        </div>

        <div class="admin-empty" id="emptyState" hidden>
          <p>暂无留言</p>
        </div>

        <div class="admin-pagination" id="pagination" hidden>
          <button type="button" class="btn btn-ghost btn-sm" id="prevPageBtn">上一页</button>
          <span class="admin-page-info" id="pageInfo">第 1 页</span>
          <button type="button" class="btn btn-ghost btn-sm" id="nextPageBtn">下一页</button>
        </div>
      </section>
    </div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
